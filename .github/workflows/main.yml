# .github/workflows/build-gcc-ios.yml
name: build-gcc-ios-aarch64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: Build GCC on macOS
    runs-on: macos-latest
    timeout-minutes: 720
    env:
      # NOTE: use full release string (major.minor.patch)
      GCC_VERSION: "15.2.0"
      GMP_VERSION: "6.2.1"
      MPFR_VERSION: "4.2.1"
      MPC_VERSION: "1.2.1"
      ISL_VERSION: "0.25"
      TARGET: "aarch64-apple-ios"
      PREFIX: "/usr/local/gcc-ios"
      DESTDIR_REL: "installroot"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Homebrew deps
        run: |
          brew update
          brew install autoconf automake libtool gawk gmp mpfr libmpc isl python@3 bison texinfo wget cmake pkg-config xz

      - name: Show environment (debug)
        run: |
          sw_vers
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path
          echo "CPU cores: $(sysctl -n hw.ncpu)"
          which clang || true
          clang --version || true

      - name: Get SDK path
        id: sdk
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "sdk_path=$SDK" >> $GITHUB_OUTPUT
          ls -la "$SDK" || true

      - name: Prepare variables
        id: vars
        run: |
          CORES=$(sysctl -n hw.ncpu || echo 2)
          echo "cores=$CORES" >> $GITHUB_OUTPUT

      - name: Download & extract helper + Sources
        run: |
          set -euo pipefail
          cd $GITHUB_WORKSPACE
          mkdir -p thirdparty
          cd thirdparty

          download_and_extract() {
            url="$1"
            out="$2"
            echo " -> Downloading $url -> $out"
            curl -fL -o "$out" "$url"
            # quick sanity check: ensure tar can list it
            if ! tar -tf "$out" >/dev/null 2>&1; then
              echo "ERROR: downloaded file $out is not a valid tar archive or is corrupted"
              file "$out" || true
              head -c 512 "$out" | sed -n '1,200p' || true
              return 2
            fi
            tar -xf "$out"
          }

          echo "Downloading GCC ${GCC_VERSION}..."
          GCC_URL="https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz"
          download_and_extract "$GCC_URL" "gcc.tar.xz"
          mv "gcc-${GCC_VERSION}" gcc-src

          echo "Downloading GMP ${GMP_VERSION}..."
          download_and_extract "https://gmplib.org/download/gmp/gmp-${GMP_VERSION}.tar.xz" "gmp.tar.xz"
          mv "gmp-${GMP_VERSION}" gcc-src/gmp

          echo "Downloading MPFR ${MPFR_VERSION}..."
          download_and_extract "https://www.mpfr.org/mpfr-${MPFR_VERSION}/mpfr-${MPFR_VERSION}.tar.xz" "mpfr.tar.xz"
          mv "mpfr-${MPFR_VERSION}" gcc-src/mpfr

          echo "Downloading MPC ${MPC_VERSION}..."
          download_and_extract "https://ftp.gnu.org/gnu/mpc/mpc-${MPC_VERSION}.tar.gz" "mpc.tar.gz"
          mv "mpc-${MPC_VERSION}" gcc-src/mpc

          echo "Downloading ISL ${ISL_VERSION}..."
          download_and_extract "https://libisl.sourceforge.io/isl-${ISL_VERSION}.tar.xz" "isl.tar.xz"
          mv "isl-${ISL_VERSION}" gcc-src/isl

          echo "Thirdparty tree prepared:"
          ls -la

      - name: Prepare build dir
        run: |
          rm -rf build || true
          mkdir -p build
          cd build
          ls -la ../thirdparty/gcc-src || true

      - name: Configure GCC (stage1)
        run: |
          set -euo pipefail
          SDK="${{ steps.sdk.outputs.sdk_path }}"
          CORES="${{ steps.vars.outputs.cores }}"
          echo "Using SDK: $SDK"
          cd build
          export CC="$(xcrun --sdk iphoneos -f clang)"
          export CXX="$(xcrun --sdk iphoneos -f clang++)"
          export SDKROOT="$SDK"
          export CFLAGS="-isysroot ${SDK} -O2 -pipe -fPIC -fno-common"
          export CXXFLAGS="$CFLAGS -std=gnu++17"
          export LDFLAGS="-isysroot ${SDK} -Wl,-syslibroot,${SDK}"
          export AS="$(xcrun --sdk iphoneos -f as)"
          export LD="$(xcrun --sdk iphoneos -f ld)"
          # configure: conservative flags to maximize success
          ../thirdparty/gcc-src/configure \
            --target=${{ env.TARGET }} \
            --prefix=${{ env.PREFIX }} \
            --with-sysroot="${SDK}" \
            --enable-languages=c,c++ \
            --disable-multilib \
            --disable-nls \
            --disable-bootstrap \
            --disable-libssp \
            --disable-libquadmath \
            --disable-libgomp \
            --disable-libvtv \
            --disable-libmudflap \
            --enable-threads=posix \
            --with-gmp=../thirdparty/gcc-src/gmp \
            --with-mpfr=../thirdparty/gcc-src/mpfr \
            --with-mpc=../thirdparty/gcc-src/mpc \
            --with-isl=../thirdparty/gcc-src/isl \
            --with-as="$AS" --with-ld="$LD" \
            CC="$CC" CXX="$CXX" CFLAGS="$CFLAGS" CXXFLAGS="$CXXFLAGS" LDFLAGS="$LDFLAGS"

      - name: Build GCC (stage1 minimal: compiler + libgcc)
        run: |
          set -euo pipefail
          cd build
          CORES="${{ steps.vars.outputs.cores }}"
          echo "Starting make (all-gcc) with ${CORES} cores..."
          MAKE_J="-j${CORES}"
          # build only the compiler itself and minimal target libgcc to reduce time & failures
          make all-gcc ${MAKE_J} 2>&1 | tee build_all_gcc.log || ( echo "make all-gcc failed, tail log:"; tail -n 200 build_all_gcc.log; false )
          make install-gcc DESTDIR=$PWD/${{ env.DESTDIR_REL }} 2>&1 | tee build_install_gcc.log || ( echo "install-gcc failed, tail log:"; tail -n 200 build_install_gcc.log; false )
          echo "Building target libgcc (minimal)..."
          make all-target-libgcc ${MAKE_J} 2>&1 | tee build_libgcc.log || ( echo "all-target-libgcc failed, tail log:"; tail -n 200 build_libgcc.log; false )
          make install-target-libgcc DESTDIR=$PWD/${{ env.DESTDIR_REL }} 2>&1 | tee build_install_libgcc.log || ( echo "install-target-libgcc failed, tail log:"; tail -n 200 build_install_libgcc.log; false )

      - name: Basic sanity: list installroot
        run: |
          if [ -d "build/${{ env.DESTDIR_REL }}/usr/local/gcc-ios" ]; then
            echo "Installroot contents (top-level):"
            find build/${{ env.DESTDIR_REL }}/usr/local/gcc-ios -maxdepth 3 -ls || true
          else
            echo "Warning: expected installroot path missing; listing build dir:"
            find build -maxdepth 4 -ls || true
          fi

      - name: Collect artifact (installroot)
        uses: actions/upload-artifact@v4
        with:
          name: gcc-ios-install
          path: build/${{ env.DESTDIR_REL }}

      - name: Package tar.gz (for quick download)
        run: |
          cd build/${{ env.DESTDIR_REL }}
          tar -czf ../../gcc-ios-${GCC_VERSION}-${{ github.run_id }}.tar.gz .
          cd ../..
      - name: Upload final tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcc-ios-tar
          path: build/gcc-ios-${GCC_VERSION}-${{ github.run_id }}.tar.gz

  package-deb:
    name: Package .deb (ubuntu)
    runs-on: ubuntu-latest
    needs: build-macos
    timeout-minutes: 60
    steps:
      - name: Download build artifact (installroot)
        uses: actions/download-artifact@v4
        with:
          name: gcc-ios-install
          path: ./artifact

      - name: Prepare packaging tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ruby ruby-dev build-essential fakeroot dpkg-dev rpm dpkg-dev zip
          sudo gem install --no-document fpm

      - name: Inspect installroot
        run: |
          echo "Listing artifact tree (first 6 levels):"
          find artifact -maxdepth 6 -type f -ls || true

      - name: Create minimal control and package with fpm
        run: |
          set -euo pipefail
          VERSION="${{ env.GCC_VERSION }}"
          PKGNAME="gcc-ios"
          if [ ! -d artifact/usr/local/gcc-ios ]; then
            echo "expected artifact/usr/local/gcc-ios missing; listing artifact root:"
            find artifact -maxdepth 6 -ls
            exit 1
          fi
          # Use fpm to create deb rooted at /usr/local/gcc-ios
          fpm -s dir -t deb -n "${PKGNAME}" -v "${VERSION}" --architecture arm64 \
            --description "Cross-built GCC for aarch64-apple-ios (prefix /usr/local/gcc-ios)" \
            -C artifact usr/local/gcc-ios
          mkdir -p out
          mv *.deb out/ || true

      - name: Zip .deb for download
        run: |
          mkdir -p release
          cp out/*.deb release/ || true
          zip -r release/gcc-ios-${{ env.GCC_VERSION }}-deb.zip release/*.deb || true

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-deb
          path: release
